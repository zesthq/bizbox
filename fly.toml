app = "bizbox"
primary_region = "syd"

[build]
dockerfile = "Dockerfile"

[env]
PORT = "3100"
HOST = "0.0.0.0"
BIZBOX_BIND = "custom"
BIZBOX_BIND_HOST = "::"
NODE_ENV = "production"
SERVE_UI = "true"
BIZBOX_HOME = "/paperclip"
BIZBOX_DEPLOYMENT_MODE = "authenticated"
BIZBOX_DEPLOYMENT_EXPOSURE = "private"
BIZBOX_PUBLIC_URL = "https://bizbox.fly.dev"
BIZBOX_MIGRATION_AUTO_APPLY = "true"
OPENCODE_ALLOW_ALL_MODELS = "true"

[http_service]
internal_port = 3100
force_https = true
auto_stop_machines = "off"
auto_start_machines = true
min_machines_running = 1

[[vm]]
memory = "2gb"
cpu_kind = "shared"
cpus = 2

[[mounts]]
source = "paperclip_data"
destination = "/paperclip"
initial_size = "10gb"
