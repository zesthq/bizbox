services:
  paperclip:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "${BIZBOX_PORT:-3100}:3100"
    environment:
      HOST: "0.0.0.0"
      BIZBOX_HOME: "/paperclip"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      BIZBOX_DEPLOYMENT_MODE: "authenticated"
      BIZBOX_DEPLOYMENT_EXPOSURE: "private"
      BIZBOX_PUBLIC_URL: "${BIZBOX_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - "${BIZBOX_DATA_DIR:-../data/docker-paperclip}:/paperclip"
