name: Sync Upstream

on:
  schedule:
    # Run weekdays at 00:00 UTC
    - cron: '0 0 * * 1-5'
  workflow_dispatch:

jobs:
  sync:
    name: Sync from paperclipai/paperclip
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout fork
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/paperclipai/paperclip.git
          git fetch upstream master

      - name: Determine if sync is needed
        id: check
        run: |
          UPSTREAM_SHA=$(git rev-parse upstream/master)
          MERGE_BASE=$(git merge-base HEAD upstream/master)
          if [ "$UPSTREAM_SHA" = "$MERGE_BASE" ]; then
            echo "Fork is already up-to-date with upstream."
            echo "needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "New upstream commits found."
            echo "needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create sync branch
        if: steps.check.outputs.needed == 'true'
        run: |
          BRANCH="chore/sync-upstream-$(date +%Y%m%d)"
          echo "SYNC_BRANCH=$BRANCH" >> "$GITHUB_ENV"
          git checkout -b "$BRANCH"

      - name: Merge upstream
        if: steps.check.outputs.needed == 'true'
        run: |
          git merge upstream/master --no-edit --allow-unrelated-histories \
            -m "chore: sync upstream paperclipai/paperclip $(date +%Y-%m-%d)" || true

          # Resolve conflicts in doc/ and docs/ by keeping our version
          CONFLICTED=$(git diff --name-only --diff-filter=U)
          DOC_CONFLICTS=$(echo "$CONFLICTED" | grep -E '^docs?/' || true)
          OTHER_CONFLICTS=$(echo "$CONFLICTED" | grep -vE '^docs?/' | grep -v '^$' || true)

          if [ -n "$OTHER_CONFLICTS" ]; then
            echo "Unresolvable conflicts outside doc/ and docs/:"
            echo "$OTHER_CONFLICTS"
            exit 1
          fi

          if [ -n "$DOC_CONFLICTS" ]; then
            echo "Resolving doc/docs conflicts by keeping our version:"
            echo "$DOC_CONFLICTS"
            echo "$DOC_CONFLICTS" | xargs git checkout HEAD --
            git add $DOC_CONFLICTS
            git commit --no-edit -m "chore: sync upstream paperclipai/paperclip $(date +%Y-%m-%d)"
          fi

      - name: Exclude upstream doc/ changes
        if: steps.check.outputs.needed == 'true'
        run: |
          # Restore the fork's doc/ so upstream doc changes are never included
          git checkout origin/${{ github.event.repository.default_branch }} -- doc/
          git add doc/
          git checkout origin/${{ github.event.repository.default_branch }} -- docs/
          git add docs/
          # Only create a fixup commit when doc/ actually differed from upstream
          git diff --staged --quiet || \
            git commit -m "chore: restore doc/ and docs/ from fork (exclude upstream doc changes)"

      - name: Push sync branch
        if: steps.check.outputs.needed == 'true'
        run: |
          git push origin "$SYNC_BRANCH" --force-with-lease

      - name: Open or update pull request
        if: steps.check.outputs.needed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          UPSTREAM_SHA=$(git rev-parse upstream/master | cut -c1-7)
          PR_TITLE="chore: sync upstream $(date +%Y-%m-%d) (${UPSTREAM_SHA})"
          PR_BODY="Automated upstream sync from [paperclipai/paperclip](https://github.com/paperclipai/paperclip).\n\n**Changes from upstream master are included, except for anything under \`doc/\`.**\n\nReview and merge if the changes look good."

          # Check whether a PR already exists for this branch
          EXISTING=$(gh pr list --head "$SYNC_BRANCH" --json number --jq '.[0].number')

          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists — branch updated."
          else
            gh pr create \
              --base "${{ github.event.repository.default_branch }}" \
              --head "$SYNC_BRANCH" \
              --title "$PR_TITLE" \
              --body "$(printf '%b' "$PR_BODY")" \
              --label "upstream-sync"
          fi
